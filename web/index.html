<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Coach Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape"></div>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">Telegram Mini App</p>
      <h1>English Coach</h1>
      <p class="subtitle">Translate words, save them, and train daily speaking.</p>
    </header>

    <section class="card">
      <h2>Translator</h2>
      <p class="hint">Enter one English or Russian word.</p>
      <input id="translateInput" placeholder="man / мужчина" maxlength="80" />
      <label class="save-toggle">
        <input id="saveWord" type="checkbox" />
        Save word to Supabase immediately
      </label>
      <button id="translateBtn" class="btn primary">Translate</button>
    </section>

    <section class="card">
      <h2>Daily Chat</h2>
      <p class="hint">Write in English. Bot will correct mistakes and explain rules.</p>
      <textarea id="chatInput" rows="4" placeholder="Today I goed to gym and feel happy..."></textarea>
      <button id="chatBtn" class="btn">Send to Tutor</button>
    </section>

    <footer class="footer">Responses will appear in Telegram chat.</footer>
  </main>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="app.js"></script>
</body>
</html>
